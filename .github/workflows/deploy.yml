name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # ── Java 버전 21로 통일 ──────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── application-prod.yml 생성 (빌드 전에 만들어야 함) ──
      - name: Create application-prod.yml
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application-prod.yml << EOF
          spring:
            datasource:
              url: ${{ secrets.DB_URL }}
              username: ${{ secrets.DB_USERNAME }}
              password: ${{ secrets.DB_PASSWORD }}
            data:
              redis:
                url: ${{ secrets.REDIS_URL }}

          naver:
            image:
              base-url: https://openapi.naver.com
              client-id: ${{ secrets.NAVER_IMAGE_CLIENT_ID }}
              client-secret: ${{ secrets.NAVER_IMAGE_CLIENT_SECRET }}

          kakao:
            local:
              base-url: https://dapi.kakao.com
              rest-api-key: ${{ secrets.KAKAO_REST_API_KEY }}

          incheon:
            api-key: ${{ secrets.INCHEON_BUS_API_KEY }}
          EOF

      - name: Build with Gradle
        run: ./gradlew build -x test

      # ── AWS 인증 ─────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── S3 업로드 ─────────────────────────────────────────
      - name: Upload jar to S3
        run: |
          JAR_FILE=$(ls build/libs/*.jar | grep -v plain)
          aws s3 cp $JAR_FILE s3://baseball-map-backend/app.jar

      # ── EC2 배포 (SSM, 완료 대기 포함) ───────────────────
      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "aws s3 cp s3://baseball-map-backend/app.jar /app/app.jar",
              "pkill -f app.jar || true",
              "sleep 3",
              "nohup java -jar /app/app.jar --spring.profiles.active=prod > /app/app.log 2>&1 &",
              "sleep 10",
              "pgrep -f app.jar && echo DEPLOY_SUCCESS || echo DEPLOY_FAIL"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # 완료될 때까지 대기 (최대 3분)
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }}

          # 실행 결과 확인
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query "StatusDetails" \
            --output text)

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query "StandardOutputContent" \
            --output text)

          echo "배포 상태: $STATUS"
          echo "실행 로그:"
          echo "$OUTPUT"

          if [ "$STATUS" != "Success" ]; then
            echo "배포 실패!"
            exit 1
          fi

          if echo "$OUTPUT" | grep -q "DEPLOY_FAIL"; then
            echo "앱 실행 실패! (프로세스 없음)"
            exit 1
          fi

          echo "✓ 배포 성공!"