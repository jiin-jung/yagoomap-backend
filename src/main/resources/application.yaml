spring:
  application:
    name: yagoomap
  config:
    import: optional:file:.env[.properties]
  profiles:
    default: local
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}  # 로컬: redis://, Upstash: rediss://
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8081

# ── 모니터링 (Spring Boot Actuator + Prometheus) ──────────────
# 공개 노출 엔드포인트는 health / info / prometheus 로 제한한다.
# (env, beans, heapdump 등 민감 엔드포인트는 노출하지 않음)
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
      # Actuator 엔드포인트는 일반 컨트롤러(CorsConfig)와 별도 핸들러라 CORS 를 따로 열어야 한다.
      # (관리자 대시보드가 api.야구맵.kr 의 health/info 를 cross-origin 으로 읽기 위함)
      cors:
        allowed-origins:
          - https://xn--2e0bt1v52i.kr
          - https://www.xn--2e0bt1v52i.kr
          - http://localhost:3000
          - http://localhost:5173
        allowed-methods: GET
  endpoint:
    health:
      show-details: when_authorized   # 인증 없이는 상태만(UP/DOWN) 노출
      probes:
        enabled: true                 # liveness / readiness 프로브
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    description: 야구맵 백엔드 API

logging:
  level:
    com.study.yagoomap: INFO
